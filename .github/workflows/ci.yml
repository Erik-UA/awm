name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to the project MSRV so CI catches edition/MSRV regressions the way
      # the dev box would. rustfmt & clippy are only available via rustup here.
      - name: Install Rust 1.75 toolchain
        run: |
          rustup toolchain install 1.75.0 --component rustfmt clippy
          rustup default 1.75.0
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # macOS PTY coverage — the dev box is Linux-only, so portable-pty on macOS is
  # verified here (allowed to fail until Track A lands; flip to required later).
  macos-pty:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: rustup default 1.75.0
      - run: cargo test -p awm-pty
